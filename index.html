<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Focus-Tap | Aesthetic Study Space</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">

    <link rel="icon" href="panda png.png" type="image/png">



  <style>
    :root {
        /* Paleta Relajante: Muted Nature & Sky */
        --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        --glass: rgba(255, 255, 255, 0.55);
        --glass-border: rgba(255, 255, 255, 0.8);
        --text: #455a64; /* Gris azulado oscuro para lectura suave */
        --text-light: #78909c;
        --accent: #9fa8da; /* Lavanda suave */
        --secondary: #80cbc4; /* Menta relajante */
        --warning: #ffe082; /* Crema suave */
        --shadow: rgba(149, 157, 165, 0.1);
    }

    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        font-family: 'Inter', -apple-system, sans-serif; 
    }

    body {
        background: var(--bg-gradient);
        background-attachment: fixed;
        min-height: 100vh;
        color: var(--text);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: background 1s ease;
    }

    /* Animación sutil para el Panda */
    .corner-panda {
        position: fixed;
        top: 30px;
        left: 30px;
        width: 110px;
        z-index: 100;
        filter: drop-shadow(0 10px 15px rgba(0,0,0,0.03));
        animation: breath 8s ease-in-out infinite;
        opacity: 0.8;
    }

    @keyframes breath {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-5px) scale(1.02); }
    }

    header { margin-bottom: 50px; }
    
    .logo { 
        font-size: 1.8rem; 
        font-weight: 300; 
        color: var(--text);
        letter-spacing: 6px;
        text-transform: uppercase;
        opacity: 0.6;
    }

    .main-container {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 35px;
        width: 100%;
        max-width: 1150px;
    }

    .content-layout { display: flex; flex-direction: column; gap: 35px; }

    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 40px; /* Bordes muy suaves */
        padding: 35px;
        box-shadow: 0 20px 40px var(--shadow);
        position: relative;
        transition: transform 0.3s ease;
    }

    .top-row { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 35px; }

    /* Reloj con estilo minimalista */
    .timer-display { 
        font-size: 95px; 
        font-weight: 200; /* Más fino para no cansar */
        text-align: center; 
        margin: 15px 0; 
        color: var(--text);
        letter-spacing: -3px;
    }

    .mode-buttons { display: flex; gap: 12px; margin-top: 25px; }
    
    .btn-mode { 
        flex: 1; 
        font-size: 0.7rem; 
        padding: 14px; 
        background: rgba(255,255,255,0.3); 
        border: 1px solid var(--glass-border); 
        color: var(--text-light); 
        border-radius: 20px; 
        letter-spacing: 1px;
    }

    .btn-mode.active-deep { background: var(--accent); color: white; border: none; }
    .btn-mode.active-prod { background: var(--secondary); color: white; border: none; }

    /* Música y controles */
    .music-title { font-weight: 500; font-size: 0.9rem; margin-bottom: 20px; color: var(--text-light); text-align: center; display: block; text-transform: uppercase; letter-spacing: 2px; }
    
    .music-select {
        width: 100%; padding: 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.5);
        background: rgba(255,255,255,0.4); color: var(--text); font-size: 0.85rem; margin-bottom: 25px; outline: none;
        cursor: pointer;
    }

    .music-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
    
    .btn-music-round { 
        width: 50px; height: 50px; border-radius: 50%; background: white; 
        display: flex; align-items: center; justify-content: center; font-size: 1rem;
        box-shadow: 0 8px 15px var(--shadow); color: var(--text-light);
    }

    .btn-music-round.play-btn { background: var(--text); color: white; font-size: 1.2rem; }

    /* Volumen personalizado */
    .volume-container { margin-top: 30px; display: flex; align-items: center; gap: 15px; padding: 0 10px; }
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(0,0,0,0.05); border-radius: 10px; }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
        background: var(--text-light); cursor: pointer; margin-top: -6px; border: 2px solid white;
    }

    .track-info { margin-top: 20px; text-align: center; font-size: 0.75rem; color: var(--text-light); font-style: italic; }

    /* Inputs y Notas */
    .todo-input { 
        width: 100%; padding: 18px; border: 1px solid rgba(0,0,0,0.03); background: rgba(255,255,255,0.6); 
        border-radius: 20px; margin-bottom: 20px; outline: none; font-size: 0.9rem; color: var(--text);
    }

    .todo-item { 
        display: flex; align-items: center; padding: 15px 20px; 
        background: rgba(255,255,255,0.3); border-radius: 20px; 
        margin-bottom: 10px; border: 1px solid var(--glass-border); 
    }

    #notes-area { 
        width: 100%; height: 160px; background: rgba(255,255,255,0.3); 
        border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; 
        margin-top: 15px; resize: none; outline: none; color: var(--text); line-height: 1.6;
    }

    .copy-btn { 
        position: absolute; top: 30px; right: 35px; font-size: 0.65rem; 
        background: white; color: var(--text-light); padding: 8px 15px; 
        border-radius: 12px; border: 1px solid var(--glass-border);
    }

    /* Notificaciones sutiles */
    #toast {
        position: fixed; top: 40px; background: white; color: var(--text);
        padding: 12px 30px; border-radius: 25px; font-size: 0.85rem; box-shadow: 0 10px 30px var(--shadow);
        opacity: 0; transition: 0.5s; z-index: 1000;
    }

    /* Botones de acción principal */
    .btn-p { background: var(--text); color: white; padding: 14px 35px; font-size: 0.9rem; border-radius: 20px; letter-spacing: 1px; }
    .btn-s { background: white; color: var(--text-light); padding: 14px 35px; border-radius: 20px; border: 1px solid var(--glass-border); }

    .sidebar-ad { 
        width: 100%; height: 100%; background: transparent; 
        border: 1px dashed var(--text-light); border-radius: 40px; 
        display: flex; align-items: center; justify-content: center; 
        color: var(--text-light); font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px; text-align: center; padding: 30px;
    }

    /* Scrollbar estética */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-light); border-radius: 10px; opacity: 0.2; }

    @media (max-width: 900px) {
        .main-container { grid-template-columns: 1fr; }
        .top-row { grid-template-columns: 1fr; }
        .sidebar-ad { display: none; }
    }
</style>
</head>

<body>



    <img src="panda png.png" alt="Panda" class="corner-panda">



    <header><h1 class="logo">FOCUS-TAP</h1></header>



    <div class="main-container">

        <div class="content-layout">



            <div class="top-row">

                <div class="glass-card" style="text-align: center;">

                    <div style="font-size: 0.9rem; font-weight: 600; opacity: 0.7; color: var(--text);">

                        SESIÓN DE <input type="number" id="m-in" value="25" style="width:40px; border:none; background:none; font-weight:800; color: var(--secondary); text-align:center;"> MINUTOS

                    </div>

                    <div class="timer-display" id="clock">25:00</div>

                    <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">

                        <button class="btn-p" id="start">Empezar</button>

                        <button class="btn-s" id="reset">Reset</button>

                    </div>



                    <div class="mode-buttons">

                        <button class="btn-mode" id="btn-deep" onclick="toggleMode('deep')">MODO ENFOQUE</button>

                        <button class="btn-mode" id="btn-prod" onclick="toggleMode('prod')">PRODUCTIVIDAD</button>

                    </div>

                </div>



                <div class="glass-card">

                    <span class="music-title">Dreamy Ambience</span>

                    <select class="music-select" id="music-menu" onchange="loadTrack()">

                        <option value="lofi">🎹 Lofi Dream</option>

                        <option value="nature">🌸 Soft Rain</option>

                        <option value="coffee">☕ Pastel Cafe</option>

                    </select>



                    <div class="music-controls">

                        <button class="btn-music-round" onclick="musicPrev()">⏮</button>

                        <button class="btn-music-round play-btn" onclick="musicToggle()" id="play-pause">▶</button>

                        <button class="btn-music-round" onclick="musicNext()">⏭</button>

                    </div>



                    <div class="volume-container">

                        <span>🔈</span>

                        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="vSet(this.value)">

                        <span>🔊</span>

                    </div>



                    <div id="track-display" class="track-info">Selecciona una pista para reproducir</div>

                </div>

            </div>



            <div class="glass-card">

                <h3 style="font-size: 1.1rem; margin-bottom: 15px; color: var(--secondary);">Metas de Estudio</h3>

                <input type="text" id="todo-in" class="todo-input" placeholder="+ Escribe una tarea y pulsa Enter">

                <div id="todo-list"></div>

            </div>



            <div class="glass-card">


                <h3 style="font-size: 1.1rem; color: var(--accent);">Notas (Se borran al cerrar la página)</h3>

                <button class="copy-btn" onclick="copy()">Copiar Notas</button>

                <textarea id="notes-area" placeholder="Vuelca aquí tus distracciones para volver al estudio..."></textarea>

                <div style="text-align: center; margin-top: 15px;">

                    <p id="motivation-quote" style="font-style: italic; font-size: 0.85rem; opacity: 0.8;">"Confía en el proceso."</p>

                </div>

            </div>

        </div>



        <div>

            <div class="sidebar-ad">

                ESPACIO PARA<br>NOTAS EXTRAS<br>O<br>PUBLICIDAD<br>✨

            </div>

        </div>

    </div>



    <div id="toast">¡Hecho!</div>

    <audio id="player" loop></audio>



    <script>

        let currentMode = null, leaveTime = null, t = null, left = 25*60;

        const clk = document.getElementById('clock'), st = document.getElementById('start');

        const player = document.getElementById('player'), playBtn = document.getElementById('play-pause');

        const trackDisplay = document.getElementById('track-display');



        function toggleMode(mode) {

            const btnDeep = document.getElementById('btn-deep'), btnProd = document.getElementById('btn-prod');

            if (currentMode === mode) {

                currentMode = null;

                btnDeep.className = "btn-mode"; btnProd.className = "btn-mode";

                if(document.fullscreenElement) document.exitFullscreen();

            } else {

                currentMode = mode;

                btnDeep.className = mode === 'deep' ? "btn-mode active-deep" : "btn-mode";

                btnProd.className = mode === 'prod' ? "btn-mode active-prod" : "btn-mode";

                if(mode === 'deep') document.documentElement.requestFullscreen().catch(() => {});

            }

        }



        document.addEventListener("visibilitychange", () => {

            if (document.hidden && currentMode && t) {

                leaveTime = Date.now();

                clearInterval(t); t = null;

                st.innerText = "Reanudar";

                showToast("¡Pausado! No pierdas el enfoque");

            } else if (!document.hidden && leaveTime && currentMode === 'deep') {

                const secondsAway = Math.floor((Date.now() - leaveTime) / 1000);

                left += secondsAway; upd();

                showToast(`Penalización: +${secondsAway}s`);

                document.body.style.background = "#ffcdd2";

                setTimeout(() => document.body.style.background = "var(--bg-gradient)", 800);

                leaveTime = null;

            }

        });



        document.getElementById('m-in').onchange = (e) => { if(!t){ left = e.target.value*60; upd(); }};

        function upd() { 

            let m=Math.floor(left/60), s=left%60; 

            clk.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; 

        }



        st.onclick = () => {

            if(t) { clearInterval(t); t=null; st.innerText="Reanudar"; }

            else {

                st.innerText="Pausar";

                t = setInterval(() => { 

                    if(left > 0) { left--; upd(); }

                    else { clearInterval(t); showToast("¡Tiempo cumplido!"); }

                }, 1000);

            }

        };



        document.getElementById('reset').onclick = () => {

            clearInterval(t); t=null; left=document.getElementById('m-in').value*60; upd(); st.innerText="Empezar";

        };



        const playlists = {

            lofi: [

                {url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", name: "Lofi Dream", author: "SoundHelix"},

                {url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", name: "Chill Beat", author: "SoundHelix"}

            ],

            nature: [

                {url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", name: "Soft Rain", author: "SoundHelix"},

                {url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", name: "Forest Whisper", author: "SoundHelix"}

            ],

            coffee: [

                {url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", name: "Pastel Cafe", author: "SoundHelix"},

                {url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3", name: "Sugar Jazz", author: "SoundHelix"}

            ]

        };

        let trackIdx = 0;



        function loadTrack() { 

            const genre = document.getElementById('music-menu').value;

            const currentTrack = playlists[genre][trackIdx];

            player.src = currentTrack.url; 

            trackDisplay.innerText = `${currentTrack.name} - ${currentTrack.author}`;

        }



        function musicToggle() {

            if (!player.src) loadTrack();

            if (player.paused) { player.play(); playBtn.innerText = "⏸"; } 

            else { player.pause(); playBtn.innerText = "▶"; }

        }

        function musicNext() { trackIdx = (trackIdx + 1) % 2; loadTrack(); player.play(); playBtn.innerText = "⏸"; }

        function musicPrev() { trackIdx = (trackIdx - 1 + 2) % 2; loadTrack(); player.play(); playBtn.innerText = "⏸"; }

        function vSet(v) { player.volume = v; }



        document.getElementById('todo-in').addEventListener('keypress', (e) => {

            if(e.key === 'Enter' && e.target.value !== "") {

                const div = document.createElement('div');

                div.className = 'todo-item';

                div.innerHTML = `<input type="checkbox" onchange="this.parentElement.classList.toggle('done')">

                                 <span style="flex:1">${e.target.value}</span>

                                 <button style="background:none; color:var(--secondary); font-weight:bold; cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`;

                document.getElementById('todo-list').appendChild(div);

                e.target.value = "";

            }

        });



        function showToast(msg) {

            const toast = document.getElementById('toast');

            toast.innerText = msg; toast.style.opacity = 1;

            setTimeout(() => toast.style.opacity = 0, 3000);

        }

        function copy() {

            const area = document.getElementById('notes-area');

            if(area.value.trim() === "") return;

            area.select(); document.execCommand('copy');

            showToast("¡Notas copiadas!");

        }

    </script>

</body>

</html>
